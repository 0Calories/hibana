name: Sync Generated Types
on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  sync:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Start Supabase
        run: supabase start --exclude studio,imgproxy,edge-runtime,logflare,vector

      - name: Regenerate types
        run: supabase gen types typescript --local > lib/supabase/types.ts

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet lib/supabase/types.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/supabase/types.ts
            git commit -m "chore(db): Sync generated types"
            git push
          fi
